{% extends "base.html" %}
{% block title %}مفضلتي{% endblock %}
{% block content %}
<h1 class="h5 mb-3">مفضلتي</h1>
<div class="row g-3">
{% for item in favorites %}
  <div class="col-md-4">
    <div class="card h-100 shadow-sm">
      <img src="{{ item.video.thumbnail_url }}" class="card-img-top" alt="{{ item.video.title }}">
      <div class="card-body">
        <a href="{% url 'video_detail' item.video.video_id %}" class="fw-semibold text-decoration-none">{{ item.video.title }}</a>
      </div>
    </div>
  </div>
{% empty %}
  <p class="text-muted">لا توجد فيديوهات في المفضلة بعد.</p>
{% endfor %}
</div>
{% endblock %}
