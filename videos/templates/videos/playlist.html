{% extends "base.html" %}
{% block title %}{{ playlist.title }}{% endblock %}
{% block content %}
<h1 class="h5 mb-3">{{ playlist.title }}</h1>
<p class="text-muted">{{ playlist.description }}</p>
<div class="row g-3">
{% for video in videos %}
<div class="col-md-4"><div class="card h-100"><img src="{{ video.thumbnail_url }}" class="card-img-top"><div class="card-body"><a href="{% url 'video_detail' video.video_id %}">{{ video.title }}</a></div></div></div>
{% empty %}<p>لا توجد فيديوهات في هذه القائمة.</p>{% endfor %}
</div>
{% endblock %}
